<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리학교 KEY박스</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <div class="title-line">
          <h1>우리학교 KEY박스 <span class="key-emoji" aria-hidden="true">🔑</span></h1>
        </div>
        <p class="desc">학교 공통 계정 및 업무정보 관리</p>
      </div>
      <div class="hero-right no-print">
        <div class="hero-actions">
          <button id="downloadTemplateBtn" class="btn ghost">기본양식 다운로드</button>
          <label class="btn primary file-label">
            엑셀 업로드
            <input id="uploadInput" type="file" accept=".xlsx,.xls" hidden />
          </label>
          <div class="local-secure" title="모든 정보는 현재 PC 브라우저에만 저장됩니다.">
            <span class="local-badge">🛡️ 외부 전송 없음 · PC 저장</span>
          </div>
        </div>
        <div class="version-line">v3.0 <span></span> senvip</div>
      </div>
    </header>

    <section class="search-panel no-print">
      <div class="search-box">
        <span class="search-symbol">⌕</span>
        <input id="accountSearch" class="account-search" type="search" placeholder="사이트명, 아이디, 메모 검색  예: S2B, EVPN, 카드, CMS" autocomplete="off" />
        <button id="clearSearchBtn" class="small-btn search-clear" type="button">검색 초기화</button>
      </div>
    </section>

    <section class="jump-nav no-print" aria-label="섹션 이동">
      <div class="jump-nav-links">
        <a href="#siteSection"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M3.6 9h16.8M3.6 15h16.8M12 3c2.2 2.4 3.2 5.4 3.2 9s-1 6.6-3.2 9M12 3C9.8 5.4 8.8 8.4 8.8 12s1 6.6 3.2 9"></path></svg><span>사이트 계정</span></a>
        <a href="#schoolInfo"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16"></path><path d="M6 20V9l6-4 6 4v11"></path><path d="M9 20v-6h6v6"></path><path d="M9 10h.01M15 10h.01"></path></svg><span>학교 공통정보</span></a>
        <a href="#bankInfo"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10h18"></path><path d="M5 10l7-5 7 5"></path><path d="M6 10v8M10 10v8M14 10v8M18 10v8"></path><path d="M4 18h16M3 21h18"></path></svg><span>은행 계좌정보</span></a>
        <a href="#cardInfo"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="3"></rect><path d="M3 10h18"></path><path d="M7 15h4"></path></svg><span>결제 수단</span></a>
      </div>
    </section>

    <section class="toolbar no-print">
      <div class="segmented">
        <span>비밀번호 표시</span>
        <label><input type="radio" name="pwMode" value="plain" checked /> 그대로</label>
        <label><input type="radio" name="pwMode" value="mask" /> 마스킹</label>
      </div>
      <div class="toolbar-actions toolbar-actions-full">
        <button id="saveBtn" class="btn save-pc">이 PC에 저장</button>
        <button id="loadSavedBtn" class="btn soft">저장 내용 불러오기</button>
        <button id="exportExcelBtn" class="btn excel">엑셀 출력</button>
        <button id="printBtn" class="btn dark">인쇄/PDF</button>
        <button id="resetBtn" class="btn danger">초기화</button>
      </div>
    </section>

    <section class="quick-copy no-print">
      <div class="quick-copy-head">
        <strong>빠른복사 <em id="quickCount" class="count-badge">0개 항목</em></strong>
        <span> ID·PW 버튼 클릭 시 자동 복사됩니다.</span>
      </div>
      <div id="quickAccounts" class="quick-grid"></div>
    </section>

    <section id="siteSection" class="account-card main-account-card">
      <div class="section-title account-title">
        <div>
          <h2>사이트 계정</h2>
          <p class="section-desc">ID/PW 버튼 클릭 시 자동 복사</p>
        </div>
        <div class="account-title-side no-print">
          <p id="rowCount">0개 항목</p>
          <button class="small-btn add-account-btn" onclick="addRow()">+ 행 추가</button>
          <button class="small-btn delete-mode-btn" onclick="toggleAccountDelete('__all__')">- 행 삭제</button>
        </div>
      </div>
      <div id="accountGroups" class="account-groups"></div>
    </section>

    <section class="info-layout" id="infoCards"></section>

    <footer class="app-footer no-print">우리학교 KEY박스 v3.0 · senvip</footer>
  </main>

  <button id="scrollTopBtn" class="scroll-top-btn no-print" title="맨 위로" type="button">↑</button>

  <div id="toast" class="toast no-print"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
