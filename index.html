<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리학교 키박스</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-nav no-print" aria-label="상단 고정 메뉴">
    <div class="top-nav-inner">
      <a class="top-brand" href="#searchArea" aria-label="검색 영역으로 이동">
        <span class="top-brand-icon" aria-hidden="true">🔑</span>
        <span class="top-brand-title">우리학교 키박스</span>
      </a>

      <nav class="top-menu" aria-label="주요 섹션 이동">
        <a href="#searchArea" class="home-link">⌂ 홈</a>
        <a href="#siteSection">🌐 사이트 계정</a>
        <a href="#schoolInfo">🏫 학교 정보</a>
        <a href="#bankInfo">🏦 은행 계좌</a>
        <a href="#cardInfo">💳 결제 수단</a>
      </nav>

      <a class="top-github" href="https://github.com/sen-vip/hakdol-keybox" target="_blank" rel="noopener">GitHub</a>
    </div>
  </header>

  <main id="top" class="app">
    <header class="hero">
      <div class="hero-copy">
        <div class="title-line">
          <h1>우리학교 키박스 <span class="key-emoji" aria-hidden="true">🔑</span></h1>
        </div>
        <p class="desc">학교 업무를 더 안전하고 편리하게 🏫</p>
      </div>
      <div class="hero-right no-print">
        <div class="trust-badges" aria-label="저장 방식 안내">
          <span class="trust-badge">🛡️ 모든 데이터는 내 기기에만 저장돼요</span>
          <span class="trust-badge">🔒 안전한 로컬 저장 방식으로 보호돼요</span>
        </div>
        <div class="version-line">v3.0 <span></span> senvip</div>
      </div>
    </header>

    <section id="searchArea" class="search-panel no-print">
      <div class="search-box">
        <span class="search-symbol">⌕</span>
        <input id="accountSearch" class="account-search" type="search" placeholder="사이트명, ID, 메모, 계좌명을 검색해보세요" autocomplete="off" />
        <button id="clearSearchBtn" class="small-btn search-clear" type="button">검색 초기화</button>
      </div>
    </section>

    <section class="toolbar no-print" aria-label="관리 도구">
      <div class="segmented">
        <span>비밀번호 표시</span>
        <label><input type="radio" name="pwMode" value="plain" checked /> 그대로</label>
        <label><input type="radio" name="pwMode" value="mask" /> 마스킹</label>
      </div>
      <div class="toolbar-actions toolbar-actions-full">
        <button id="saveBtn" class="btn save-pc">이 PC에 저장</button>
        <button id="loadSavedBtn" class="btn soft">PC 저장내용 불러오기</button>
        <button id="printBtn" class="btn dark">인쇄/PDF</button>
        <button id="exportExcelBtn" class="btn excel excel-download" type="button">엑셀 다운</button>
        <label class="btn excel-upload file-label">
          엑셀 업로드
          <input id="uploadInput" type="file" accept=".xlsx,.xls" hidden />
        </label>
        <button id="downloadTemplateBtn" class="btn soft legacy-excel-tool" type="button">기본양식 다운로드</button>
        <button id="jsonBackupBtn" class="btn soft legacy-data-tool" type="button">JSON 백업</button>
        <label class="btn soft file-label legacy-data-tool">
          JSON 불러오기
          <input id="jsonLoadInput" type="file" accept=".json,application/json" hidden />
        </label>
        <button id="resetBtn" class="btn danger">초기화</button>
      </div>
    </section>

    <section id="quickCopy" class="quick-copy no-print">
      <div class="quick-copy-head">
        <strong>⚡ 빠른복사 <em id="quickCount" class="count-badge">0개 항목</em></strong>
        <span>ID·PW 버튼 클릭 시 자동 복사됩니다.</span>
      </div>
      <div id="quickAccounts" class="quick-grid"></div>
    </section>

    <section id="siteSection" class="account-card main-account-card">
      <div class="section-title account-title">
        <div>
          <h2>🌐 사이트 계정</h2>
          <p class="section-desc">ID·PW 버튼 클릭 시 자동 복사됩니다.</p>
        </div>
        <div class="account-title-side no-print">
          <p id="rowCount">0개 항목</p>
          <button class="small-btn add-account-btn" onclick="addRow()">+ 행 추가</button>
          <button class="small-btn delete-mode-btn" onclick="toggleAccountDelete('__all__')">- 행 삭제</button>
        </div>
      </div>
      <div id="accountGroups" class="account-groups"></div>
    </section>

    <section class="info-layout" id="infoCards"></section>

    <footer class="app-footer no-print">우리학교 키박스 v3.0 · senvip</footer>
  </main>

  <button id="scrollTopBtn" class="scroll-top-btn no-print" title="맨 위로" type="button">↑</button>

  <div id="toast" class="toast no-print"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
